<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>菠蘿熊排序遊戲 - 2.5D 叢林背景</title>
  <link rel="stylesheet" href="./game_style.css" />
  <link rel="preload" href="./pineapple_hammer.png" as="image" />
  <!-- 使用 Tailwind CDN 以支援原本的樣式類別 -->
  <script src="https://cdn.tailwindcss.com"></script>

</head>
<body>
  <!-- 2.5D Jungle Canvas Background -->
  <canvas id="gameCanvas"></canvas>

    <!-- Hidden SFX audio elements (trigger from game_script.js) -->
  <audio id="sfxPlaceCorrect" src="./place_correct.mp3" preload="auto" style="display: none;"></audio>
  <audio id="sfxPlaceWrong" src="./place_wrong.mp3" preload="auto" style="display: none;"></audio>
  <audio id="sfxCorrectHappy" src="./correct_happy.mp3" preload="auto" style="display: none;"></audio>
  <audio id="sfxMiddleLevelSuccess" src="./middle_level_success.mp3" preload="auto" style="display: none;"></audio>
  
  <!-- Pineapple Bear Image -->

    <img
    id="pineappleBearImage"
    src="./pineapple_bear.png"
    alt="菠蘿熊圖片"
    style="position: fixed; left: 20px; bottom: 20px; height: 25vh; width: auto; transform: none; transform-origin: bottom left; pointer-events: none;"
  />


  <img
    id="yellowBubbleImage"
    src="./yellow_bubble.png"
    alt="黃色對話泡泡"
    style="position: fixed; pointer-events: none; display: none; z-index: 5; transform: translateY(-90%) translateX(-2.5%) scale(0.4); transform-origin: bottom left; opacity: 0.9;"
  />
    <div id="yellowBubbleText" aria-live="polite" aria-atomic="true"></div>

  <!-- Descending-mode start hint (arrow + label) -->
  <img
    id="descendingStartArrow"
    src="./down_arrow.png"
    alt="下降模式起點箭頭"
  />
  <div id="descendingStartLabel">從這裏開始</div>

  <!-- Top-left slide-out menu arrow -->
  <button
    id="menuArrow"
    class="menu-arrow pineapple-box"
    onclick="returnToMenu()"
    type="button"
  >
    <span class="menu-arrow-label">
      <span style="font-size:2em">🏠</span> 返回菜單
    </span>
  </button>
    <div id="gameShell" class="game-shell max-w-3xl mx-auto">
        <!-- 頂部標題列 -->
    <header class="game-header">
      <h1
        id="gameTitle"
        class="font-bold text-center text-amber-600 drop-shadow-sm"
        style="font-size:clamp(2rem, 3vw, 5rem)"
      >
        🍍 菠蘿熊排序遊戲 🍍
      </h1>
      <span
        class="mx-4 text-2xl md:text-4xl font-bold text-amber-600 drop-shadow-sm"
      >
        |
      </span>
            <span
        id="orderInfo"
        class="font-bold text-amber-600 drop-shadow-sm"
        style="font-size:clamp(1.5rem, 2.5vw, 4rem)"
      ></span>
      <span
        class="mx-4 text-2xl md:text-4xl font-bold text-amber-600 drop-shadow-sm"
      >
        |
      </span>
            <span
        id="difficultyInfo"
        class="font-bold text-amber-600 drop-shadow-sm"
        style="font-size:clamp(1.5rem, 2.5vw, 4rem)"
      ></span>
    </header>

    <!-- 主菜單容器：新版流程中不顯示任何內容，僅作結構及後備使用 -->
    <div id="mainMenu" class="hidden"></div>

    <!-- 遊戲區：登入及主選單後直接顯示 -->
    <div id="gameArea">


      <!-- 數字區 -->
      <div
        id="numbers"
        class="flex flex-wrap justify-center gap-3 md:gap-4 mb-6"
      ></div>

            <!-- 格仔區 -->
      <div
        id="slotsAndArrowContainer"
        class="flex flex-col items-center gap-3 md:gap-6 mb-2 flex-wrap"
      >
        <div
          id="slots"
          class="flex flex-wrap justify-center gap-2 md:gap-3"
        ></div>

        <div
          id="bottomModeArrowStrip"
          class="flex items-center justify-center"
          aria-hidden="true"
        >
          <span class="text-3xl">小</span>
          <svg
            id="bottomArrowRight"
            class="bottom-mode-arrow"
            viewBox="0 0 1000 120"
            preserveAspectRatio="none"
            role="presentation"
          >
            <rect x="10" y="45" width="870" height="30" rx="8" ry="8"></rect>
            <polygon points="840,16 980,60 840,104" fill="#black" stroke="#black" stroke-width="2"/>
          </svg>
          <svg
            id="bottomArrowLeft"
            class="bottom-mode-arrow hidden"
            viewBox="0 0 1100 120"
            preserveAspectRatio="none"
            role="presentation"
          >
            <rect x="140" y="45" width="950" height="30" rx="8" ry="8"></rect>
            <polygon points="160,16 20,60 160,104" fill="black" stroke="black" stroke-width="2"/>
          </svg>
          <span class="text-6xl">大</span>
        </div>
      </div>



      <!-- 寶箱 -->
      <div id="treasure" class="hidden mb-6">
        <div id="chest" class="w-40 h-28 mx-auto relative chest">
          <div
            class="chest-lid w-40 h-12 bg-gradient-to-b from-yellow-300 to-yellow-400 rounded-t-3xl border-4 border-orange-400 absolute top-0 flex items-center justify-center"
          >
            <div
              class="w-8 h-6 bg-yellow-600 rounded-full border-2 border-yellow-700"
            ></div>
          </div>
          <div
            class="w-40 h-16 bg-gradient-to-b from-orange-300 to-orange-400 rounded-b-3xl border-4 border-orange-500 absolute bottom-0 flex items-center justify-center"
          >
            <div class="text-2xl" id="treasureContent">🎁</div>
          </div>
        </div>
        <p id="outfitName" class="text-lg font-bold text-amber-700 mt-3"></p>
      </div>

      <div
        class="flex flex-col md:flex-row justify-center items-center gap-4 md:gap-6"
      >
        <!-- 對話框 -->
        <div
          class="speech-bubble rounded-3xl p-4 max-w-xs order-2 md:order-1"
        >
          <p id="speech" class="text-lg md:text-xl">
            
          </p>
        </div>
    </div>
  </div>

        <!-- 勝利模態 -->
  <div id="victoryModal" class="modal-overlay hidden">
    <div class="modal-content">
      <p id="victoryMessage" class="victory-message mb-8"></p>
      <div id="victoryButtons" class="victory-buttons">
        <button
          id="victoryPrimaryButton"
          type="button"
          class="victory-button"
        ></button>
        <button
          id="victorySecondaryButton"
          type="button"
          class="victory-button hidden"
        ></button>
      </div>
    </div>
  </div>

  <!-- Reward overlay for pineapple hammer -->
  <div id="rewardOverlay" class="reward-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="rewardText">
    <div class="reward-overlay-content">
      <div id="rewardHammerContainer" class="reward-hammer-container">
        <img
          id="rewardHammerImage"
          src="./pineapple_hammer.png"
          alt="菠蘿錘"
          class="reward-hammer-image"
        />
        <div id="rewardHammerRays" class="reward-hammer-rays" aria-hidden="true"></div>
      </div>
      <p id="rewardText" class="reward-text">恭喜你獲得了菠蘿錘</p>
      <button
        id="rewardClaimButton"
        type="button"
        class="pushable-button dialog-choice-button reward-claim-button"
      >
        <span class="front">領取獎賞</span>
      </button>
    </div>
  </div>


    <script src="./game_script.js"></script>


  <script>
    (function () {
      function playAudioById(id) {
        const el = document.getElementById(id);
        if (!el) return;
        try {
          el.currentTime = 0;
          el.play();
        } catch (_) {}
      }

      window.playPlaceCorrectSfx = function () {
        playAudioById('sfxPlaceCorrect');
      };

      window.playPlaceWrongSfx = function () {
        playAudioById('sfxPlaceWrong');
      };

      window.playCorrectHappySfx = function () {
        playAudioById('sfxCorrectHappy');
      };
    })();

    (function () {
      const bear = document.getElementById('pineappleBearImage');
      const bubble = document.getElementById('yellowBubbleImage');
      const bubbleText = document.getElementById('yellowBubbleText');

      function positionBubble() {
        if (!bear || !bubble) return;
        const rect = bear.getBoundingClientRect();
        const bubbleRect = bubble.getBoundingClientRect();
        bubble.style.left = `${rect.right}px`;
        bubble.style.top = `${rect.top + rect.height / 2}px`;
        bubble.style.display = 'block';

        if (bubbleText) {
          const bubbleRect = bubble.getBoundingClientRect();
          bubbleText.style.left = `${bubbleRect.left + bubbleRect.width / 2}px`;
          bubbleText.style.top = `${bubbleRect.top + bubbleRect.height / 2}px`;
          bubbleText.style.display = 'flex';
        }
      }

      window.addEventListener('load', positionBubble);
      window.addEventListener('resize', positionBubble);
    })();
  </script>
</body>
</html>
